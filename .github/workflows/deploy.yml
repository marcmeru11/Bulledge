name: "Export and Deploy to GitHub Pages"
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y curl libfontconfig1

      - name: Setup templates
        run: |
          TEMPLATE_PATH=~/.local/share/godot/export_templates/4.6.2.stable
          mkdir -p "$TEMPLATE_PATH"
          if [ -d "/root/.local/share/godot/templates/4.6.2.stable" ]; then
            cp -r /root/.local/share/godot/templates/4.6.2.stable/* "$TEMPLATE_PATH/"
          elif [ -d "/root/.local/share/godot/export_templates/4.6.2.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.6.2.stable/* "$TEMPLATE_PATH/"
          fi

      - name: Inject Talo API Key
        run: |
          mkdir -p addons/talo
          cat <<EOF > addons/talo/settings.cfg
          access_key="${{ secrets.TALO_API_KEY }}"
          api_url="https://api.trytalo.com"
          socket_url="wss://api.trytalo.com"
          auto_connect_socket=true
          handle_tree_quit=true
          cache_player_on_identify=true
          debounce_timer_seconds=1.0

          [continuity]
          enabled=true

          [player_auth]
          auto_start_session=true
          EOF

      - name: Web Build
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html

      - name: Install Node.js and Obfuscator
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          apt-get install -y nodejs
          npm install -g javascript-obfuscator

      - name: Obfuscate JavaScript
        run: |
          # Ofuscamos el archivo JS principal que genera Godot
          # Nota: Asegúrate de que el nombre coincida (normalmente es index.js)
          javascript-obfuscator build/web/index.js --output build/web/index.js --compact true --self-defending true --string-array true --string-array-encoding 'rc4' --string-array-threshold 1
      # ------------------------------

      - name: Add COOP/COEP headers and Favicon
        run: |
          # Download COOP/COEP worker for Godot 4
          curl -fsSL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js -o build/web/coi-serviceworker.min.js
          
          # Inject service worker script into index.html
          sed -i 's/<script/<script src="coi-serviceworker.min.js"><\/script><script/g' build/web/index.html
          
          # Copy favicon from assets and inject it into the HTML head
          cp assets/favicon.png build/web/
          sed -i 's/<\/head>/<link rel="icon" type="image\/png" href="favicon.png"><\/head>/g' build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
