name: "Export and Deploy to GitHub Pages"
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          cp -r /root/.local/share/godot/templates/4.6.2.stable/* ~/.local/share/godot/export_templates/4.6.2.stable/ || true

      - name: Inject Talo API Key
        run: |
          mkdir -p addons/talo
          echo 'access_key="${{ secrets.TALO_API_KEY }}"' > addons/talo/settings.cfg
          echo 'api_url="https://api.trytalo.com"' >> addons/talo/settings.cfg
          echo 'socket_url="wss://api.trytalo.com"' >> addons/talo/settings.cfg
          echo 'auto_connect_socket=true' >> addons/talo/settings.cfg
          echo 'handle_tree_quit=true' >> addons/talo/settings.cfg
          echo 'cache_player_on_identify=true' >> addons/talo/settings.cfg
          echo 'debounce_timer_seconds=1.0' >> addons/talo/settings.cfg
          echo '' >> addons/talo/settings.cfg
          echo '[continuity]' >> addons/talo/settings.cfg
          echo 'enabled=true' >> addons/talo/settings.cfg
          echo '' >> addons/talo/settings.cfg
          echo '[player_auth]' >> addons/talo/settings.cfg
          echo 'auto_start_session=true' >> addons/talo/settings.cfg

      - name: Web Build
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html

      - name: Add COOP/COEP headers
        run: |
          curl -fsSL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js -o build/web/coi-serviceworker.min.js
          sed -i 's/<script/<script src="coi-serviceworker.min.js"><\/script><script/g' build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages